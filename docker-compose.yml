version: '3.8'

services:
  # 1. Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: financas_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: L97@#s26
      POSTGRES_DB: financas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Back-end Quarkus
  backend:
    build: 
      context: ./backend-quarkus/ # Ajuste para a pasta onde está o Dockerfile do Quarkus
    container_name: financas_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/financas
      - QUARKUS_DATASOURCE_USERNAME=admin
      - QUARKUS_DATASOURCE_PASSWORD=L97@#s26
    depends_on:
      - db

  # 3. Front-end Angular (Nginx)
  frontend:
    build: 
      context: ./frontend-angular/
    container_name: financas_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: