# 1. Configurações para o Frontend (CORS dinâmico)
quarkus.http.cors.enabled=true
# Usa a URL da Vercel se existir, senão usa o seu Angular local
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:4200}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# 2. Configurações do Banco de Dados (MySQL Dinâmico)
quarkus.datasource.db-kind=mysql
# Mantive as suas configurações de UTF-8 e Timezone no fallback local, são excelentes!
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:mysql://localhost:3306/db_gastos?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:root}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:root}

# 3. Gerenciamento do Schema pelo Hibernate
quarkus.hibernate-orm.database.generation=${QUARKUS_HIBERNATE_GENERATION:update}
quarkus.hibernate-orm.log.sql=true

# 4. Configuração JWT
mp.jwt.verify.issuer=https://sistemafinanceiro.com
