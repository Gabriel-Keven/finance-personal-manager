<div class="charts-container">
    <!-- Gráfico de Pizza -->
    <mat-card appearance="outlined" class="chart-card">
        <mat-card-header>
            <mat-card-title>Gastos por Categoria</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <canvas baseChart [data]="pieChartData" [options]="pieChartOptions" [type]="pieChartType">
            </canvas>
        </mat-card-content>
    </mat-card>

    <!-- Gráfico de Barras -->
    <mat-card appearance="outlined" class="chart-card">
        <mat-card-header>
            <mat-card-title>Rendas vs Despesas</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType">
            </canvas>
        </mat-card-content>
    </mat-card>

</div>
