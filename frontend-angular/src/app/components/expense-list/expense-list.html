<mat-card class="list-card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>Extrato de Despesas</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        
        <table mat-table [dataSource]="expenses()" class="mat-elevation-z8">

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Despesa </th>
                <td mat-cell *matCellDef="let despesa"> {{ despesa.name }} </td>
            </ng-container>

            <ng-container matColumnDef="value">
                <th mat-header-cell *matHeaderCellDef> Valor </th>
                <td mat-cell *matCellDef="let despesa"> {{ despesa.value | currency:'BRL' }} </td>
            </ng-container>

            <ng-container matColumnDef="datePurchase">
                <th mat-header-cell *matHeaderCellDef> Data </th>
                <td mat-cell *matCellDef="let despesa"> {{ despesa.datePurchase | date:'dd/MM/yyyy' }} </td>
            </ng-container>

            <ng-container matColumnDef="paid">
                <th mat-header-cell *matHeaderCellDef> Status </th>
                <td mat-cell *matCellDef="let despesa">
                    @if (despesa.paid) {
                        <span class="badge-pago">Pago</span>
                    } @else {
                        <span class="badge-pendente">Pendente</span>
                    }
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            
        </table>

    </mat-card-content>
</mat-card>
