<mat-card class="list-card" appearance="outlined">
    <mat-card-header>
        <mat-card-title>Extrato dos Tipos de pagamentos</mat-card-title>
    </mat-card-header>
    <mat-card-content>

        <div class="table-container">
            <table mat-table [dataSource]="paymentsTypes()" class="mat-elevation-z0">

                <ng-container matColumnDef="idTypePayments">
                    <th mat-header-cell *matHeaderCellDef> ID </th>
                    <td mat-cell *matCellDef="let paymentsTypes"> <strong>#{{ paymentsTypes.idTypePayments }}</strong> </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef> Tópico </th>
                    <td mat-cell *matCellDef="let paymentsTypes"> {{ paymentsTypes.name }} </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef style="text-align: center;"> Ações </th>
                    <td mat-cell *matCellDef="let paymentsTypes" style="text-align: center;">

                        <button mat-icon-button color="primary" matTooltip="Editar" (click)="editPaymentType(paymentsTypes)">
                            <mat-icon>edit</mat-icon>
                        </button>

                        <button mat-icon-button color="warn" matTooltip="Excluir"
                            (click)="deletePaymentType(paymentsTypes.idTypePayments)">
                            <mat-icon>delete</mat-icon>
                        </button>

                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
            </table>
        </div>
    </mat-card-content>
</mat-card>
